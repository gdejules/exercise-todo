<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Interactive Minimal To-Do List</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Your To-Do List</h1>
            <form>
                <input type="text" id="todo-input" placeholder="What task do you want to do?" required>
                <button type="submit">Add Task</button>
            </form>
            <ul id="todo-list"></ul>
        </div>
    </body>
</html>
